<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LexVault — Legal Document Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:       #0f0e0c;
    --paper:     #f5f0e8;
    --cream:     #ede7d9;
    --gold:      #c9a84c;
    --gold-dim:  #8a6f2e;
    --red:       #c0392b;
    --green:     #2d6a4f;
    --blue:      #1a3a5c;
    --muted:     #7a7060;
    --border:    #d4c9b0;
    --sidebar-w: 280px;
    --header-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── AUTH SCREEN ─────────────────────────────────── */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    animation: fadeIn .3s ease;
  }
  .auth-card {
    background: var(--paper);
    width: 400px;
    padding: 48px 40px;
    border: 1px solid var(--border);
    position: relative;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border: 1px solid var(--gold);
    pointer-events: none;
  }
  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .auth-logo span { color: var(--gold); }
  .auth-tagline { font-size: 12px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 32px; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .auth-tab {
    flex: 1; padding: 10px; background: none; border: none; cursor: pointer;
    font-family: 'Instrument Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--muted); letter-spacing: .05em;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .2s;
  }
  .auth-tab.active { color: var(--ink); border-bottom-color: var(--gold); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); background: var(--cream);
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink);
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--gold); }

  .btn-primary {
    width: 100%; padding: 12px;
    background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'Instrument Sans', sans-serif; font-size: 13px;
    font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    transition: background .2s;
    margin-top: 4px;
  }
  .btn-primary:hover { background: var(--gold-dim); }
  .auth-error { font-size: 12px; color: var(--red); margin-top: 12px; text-align: center; min-height: 16px; }

  /* ── LAYOUT ──────────────────────────────────────── */
  #app { display: flex; flex: 1; overflow: hidden; }

  /* ── HEADER ──────────────────────────────────────── */
  header {
    height: var(--header-h);
    background: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid #2a2820;
    flex-shrink: 0;
  }
  .header-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--paper); }
  .header-logo span { color: var(--gold); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-user { font-size: 12px; color: #8a8070; font-family: 'DM Mono', monospace; }
  .btn-logout {
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); background: none; border: 1px solid #3a3830;
    padding: 5px 12px; cursor: pointer; font-family: 'Instrument Sans', sans-serif;
    transition: all .2s;
  }
  .btn-logout:hover { color: var(--paper); border-color: #6a6050; }

  /* ── SIDEBAR ─────────────────────────────────────── */
  aside {
    width: var(--sidebar-w);
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .btn-new {
    width: 100%; padding: 10px;
    background: var(--gold); color: var(--ink);
    border: none; cursor: pointer;
    font-family: 'Instrument Sans', sans-serif; font-size: 12px;
    font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    transition: background .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-new:hover { background: var(--gold-dim); color: var(--paper); }
  .sidebar-label {
    padding: 12px 16px 6px;
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  }
  .doc-list { overflow-y: auto; flex: 1; }
  .doc-item {
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    position: relative;
  }
  .doc-item:hover { background: var(--paper); }
  .doc-item.active { background: var(--paper); border-left: 3px solid var(--gold); padding-left: 13px; }
  .doc-item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-item-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .doc-item-versions {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: var(--border); color: var(--muted);
    padding: 2px 6px;
  }
  .doc-empty { padding: 24px 16px; font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }

  /* ── MAIN CONTENT ────────────────────────────────── */
  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── EMPTY STATE ─────────────────────────────────── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 12px;
  }
  .empty-state-icon { font-size: 48px; opacity: .3; }
  .empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); opacity: .4; }
  .empty-state p { font-size: 13px; }

  /* ── DOCUMENT VIEW ───────────────────────────────── */
  #doc-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .doc-toolbar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--paper);
    flex-shrink: 0;
  }
  .doc-title-input {
    flex: 1; font-family: 'DM Serif Display', serif; font-size: 20px;
    border: none; background: transparent; color: var(--ink);
    outline: none; min-width: 0;
  }
  .doc-title-input::placeholder { color: var(--border); }
  .toolbar-btn {
    padding: 7px 14px; border: 1px solid var(--border); background: var(--paper);
    cursor: pointer; font-size: 12px; font-family: 'Instrument Sans', sans-serif;
    font-weight: 500; letter-spacing: .04em;
    color: var(--ink); transition: all .2s; white-space: nowrap;
  }
  .toolbar-btn:hover { background: var(--cream); border-color: var(--gold); }
  .toolbar-btn.danger { color: var(--red); }
  .toolbar-btn.danger:hover { background: #fff0ee; border-color: var(--red); }
  .toolbar-btn.accent { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .toolbar-btn.accent:hover { background: var(--gold-dim); border-color: var(--gold-dim); }

  .doc-body { flex: 1; display: flex; overflow: hidden; }

  /* ── EDITOR PANEL ────────────────────────────────── */
  .editor-panel {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 16px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .version-badge {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--ink); color: var(--gold);
    padding: 2px 8px;
  }
  textarea {
    flex: 1; padding: 20px;
    border: none; outline: none; resize: none;
    font-family: 'DM Mono', monospace; font-size: 13px;
    line-height: 1.7; color: var(--ink);
    background: var(--paper);
  }
  .change-summary-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--cream);
    flex-shrink: 0;
  }
  .change-summary-bar input {
    flex: 1; border: 1px solid var(--border); padding: 6px 10px;
    background: var(--paper); font-family: 'DM Mono', monospace;
    font-size: 12px; outline: none; color: var(--ink);
  }
  .change-summary-bar input:focus { border-color: var(--gold); }
  .save-btn {
    padding: 7px 16px; background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'Instrument Sans', sans-serif; font-size: 12px;
    font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    transition: background .2s; white-space: nowrap;
  }
  .save-btn:hover { background: var(--gold-dim); }
  .save-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── VERSION HISTORY PANEL ───────────────────────── */
  .history-panel {
    width: 240px; display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
    background: var(--cream);
  }
  .version-list { overflow-y: auto; flex: 1; }
  .version-item {
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .version-item:hover { background: var(--paper); }
  .version-item.active { background: var(--paper); border-left: 3px solid var(--gold-dim); padding-left: 11px; }
  .version-item-num { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--gold-dim); }
  .version-item-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .version-item-author { font-size: 11px; color: var(--ink); margin-top: 2px; }
  .version-item-summary { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .version-actions { display: flex; gap: 4px; margin-top: 6px; }
  .ver-btn {
    font-size: 10px; letter-spacing: .04em; text-transform: uppercase;
    padding: 2px 7px; border: 1px solid var(--border); background: none;
    cursor: pointer; font-family: 'Instrument Sans', sans-serif;
    color: var(--muted); transition: all .15s;
  }
  .ver-btn:hover { background: var(--paper); color: var(--ink); border-color: var(--ink); }
  .ver-btn.del:hover { color: var(--red); border-color: var(--red); }

  /* ── DIFF VIEW ───────────────────────────────────── */
  #diff-view {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .diff-toolbar {
    padding: 10px 20px;
    background: var(--cream); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .diff-toolbar label { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .diff-toolbar select {
    padding: 5px 10px; border: 1px solid var(--border);
    background: var(--paper); font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--ink); outline: none; cursor: pointer;
  }
  .diff-toolbar select:focus { border-color: var(--gold); }
  .diff-run-btn {
    padding: 6px 16px; background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'Instrument Sans', sans-serif; font-size: 12px;
    font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    transition: background .2s;
  }
  .diff-run-btn:hover { background: var(--gold-dim); }
  .diff-stats {
    display: flex; gap: 16px; padding: 8px 20px;
    background: var(--paper); border-bottom: 1px solid var(--border);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .stat-chip {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 3px 10px; border: 1px solid;
  }
  .stat-chip.add { color: var(--green); border-color: var(--green); background: #f0faf5; }
  .stat-chip.del { color: var(--red); border-color: var(--red); background: #fff5f5; }
  .stat-chip.rep { color: #7a4f00; border-color: #c9a84c; background: #fdf8ed; }
  .stat-chip.eq  { color: var(--muted); border-color: var(--border); }
  .stat-chip.sim { color: var(--blue); border-color: var(--blue); background: #f0f5ff; }
  .stat-chip.sig { color: var(--red); border-color: var(--red); background: #fff5f5; font-weight: 600; }
  .diff-table-wrap { flex: 1; overflow-y: auto; }
  .diff-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
  .diff-table td { padding: 3px 8px; vertical-align: top; white-space: pre-wrap; word-break: break-word; }
  .diff-ln { width: 36px; text-align: right; color: var(--muted); opacity: .6; user-select: none; border-right: 1px solid var(--border); padding-right: 8px; }
  .diff-tag { width: 20px; text-align: center; font-weight: 700; user-select: none; }
  .diff-content { line-height: 1.6; }
  tr.eq   { background: var(--paper); }
  tr.ins  { background: #edfaf2; }
  tr.ins .diff-tag  { color: var(--green); }
  tr.del  { background: #fff0f0; }
  tr.del .diff-tag  { color: var(--red); }
  tr.rep-before { background: #fff8e6; }
  tr.rep-before .diff-tag { color: #c9a84c; }
  tr.rep-after  { background: #fffbe0; }
  tr.rep-after .diff-tag { color: var(--gold-dim); }
  .diff-placeholder { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; }

  /* ── NEW DOC MODAL ───────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,14,12,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--paper);
    width: 520px; max-width: 95vw;
    padding: 32px;
    border: 1px solid var(--border);
    position: relative;
    animation: slideUp .2s ease;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: -3px; left: -3px; right: -3px; bottom: -3px;
    border: 1px solid var(--gold);
    pointer-events: none;
  }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }
  .modal textarea {
    border: 1px solid var(--border); padding: 10px;
    font-size: 13px; line-height: 1.7;
    height: 180px; margin-bottom: 12px;
    resize: vertical;
  }
  .modal textarea:focus { border-color: var(--gold); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary {
    padding: 9px 20px; border: 1px solid var(--border); background: none;
    cursor: pointer; font-family: 'Instrument Sans', sans-serif;
    font-size: 13px; color: var(--muted); transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

  /* ── TOAST ───────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; font-size: 13px;
    border-left: 3px solid var(--gold);
    transform: translateY(80px); opacity: 0;
    transition: all .3s ease;
    z-index: 200; pointer-events: none;
    font-family: 'DM Mono', monospace;
    max-width: 360px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-left-color: var(--red); }

  /* ── VIEW TABS ───────────────────────────────────── */
  .view-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--cream);
    flex-shrink: 0;
  }
  .view-tab {
    padding: 10px 20px; cursor: pointer; background: none; border: none;
    font-family: 'Instrument Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: .05em; text-transform: uppercase; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .2s;
  }
  .view-tab.active { color: var(--ink); border-bottom-color: var(--gold); }

  /* ── ANIMATIONS ──────────────────────────────────── */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Lex<span>Vault</span></div>
    <div class="auth-tagline">Legal Document Manager</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Username</label><input type="text" id="login-user" placeholder="jane_lawyer" /></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
    </div>
    <div id="register-form" class="hidden">
      <div class="field"><label>Username</label><input type="text" id="reg-user" placeholder="jane_lawyer" /></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="jane@lawfirm.com" /></div>
      <div class="field"><label>Full Name</label><input type="text" id="reg-name" placeholder="Jane Smith" /></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<header>
  <div class="header-logo">Lex<span>Vault</span></div>
  <div class="header-right">
    <span class="header-user" id="header-user"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</header>

<div id="app">
  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-top">
      <button class="btn-new" onclick="showNewDocModal()">＋ New Document</button>
    </div>
    <div class="sidebar-label">Documents</div>
    <div class="doc-list" id="doc-list">
      <div class="doc-empty">No documents yet.<br/>Create your first document.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">⚖</div>
      <h2>No document selected</h2>
      <p>Select a document from the sidebar or create a new one.</p>
    </div>

    <!-- DOCUMENT VIEW -->
    <div id="doc-view" class="hidden">
      <div class="doc-toolbar">
        <input class="doc-title-input" id="doc-title-input" placeholder="Document Title" />
        <button class="toolbar-btn" onclick="saveTitle()">Save Title</button>
        <button class="toolbar-btn" onclick="showDiffView()">⇄ Compare</button>
        <button class="toolbar-btn danger" onclick="deleteDoc()">✕ Delete</button>
      </div>
      <div class="view-tabs">
        <button class="view-tab active" id="tab-editor" onclick="switchTab('editor')">Editor</button>
        <button class="view-tab" id="tab-diff" onclick="switchTab('diff')">Diff Viewer</button>
      </div>

      <!-- EDITOR -->
      <div id="editor-panel" class="doc-body">
        <div class="editor-panel">
          <div class="panel-header">
            <span>Document Content</span>
            <span class="version-badge" id="version-badge">v—</span>
          </div>
          <textarea id="doc-editor" placeholder="Begin typing your legal document here...&#10;&#10;Each save creates a new immutable version."></textarea>
          <div class="change-summary-bar">
            <input type="text" id="change-summary" placeholder="Change summary (optional)…" />
            <button class="save-btn" id="save-version-btn" onclick="saveVersion()">Save Version</button>
          </div>
        </div>
        <div class="history-panel">
          <div class="panel-header">Version History</div>
          <div class="version-list" id="version-list"></div>
        </div>
      </div>

      <!-- DIFF -->
      <div id="diff-panel" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div class="diff-toolbar">
          <label>Version A (Before)</label>
          <select id="diff-va"></select>
          <label>Version B (After)</label>
          <select id="diff-vb"></select>
          <button class="diff-run-btn" onclick="runDiff()">Compare</button>
          <button class="toolbar-btn" onclick="switchTab('editor')" style="margin-left:auto;">← Back to Editor</button>
        </div>
        <div class="diff-stats hidden" id="diff-stats"></div>
        <div class="diff-table-wrap" id="diff-output">
          <div class="diff-placeholder">Select two versions above and click Compare.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- NEW DOC MODAL -->
<div class="modal-overlay hidden" id="new-doc-modal">
  <div class="modal">
    <h3>New Legal Document</h3>
    <div class="field"><label>Title</label><input type="text" id="new-doc-title" placeholder="e.g. Acme Corp NDA" /></div>
    <div class="field" style="margin-bottom:0">
      <label>Initial Content</label>
      <textarea id="new-doc-content" placeholder="This Agreement is entered into…" style="border:1px solid var(--border);padding:10px;height:160px;resize:vertical;margin-top:6px;font-family:'DM Mono',monospace;font-size:13px;background:var(--cream);color:var(--ink);outline:none;width:100%;"></textarea>
    </div>
    <div class="field"><label>Change Summary</label><input type="text" id="new-doc-summary" placeholder="Initial draft" /></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="hideNewDocModal()">Cancel</button>
      <button class="btn-primary" style="width:auto;padding:9px 24px;" onclick="createDoc()">Create Document</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://web-production-ae86a.up.railway.app/api/v1';
let token = localStorage.getItem('lv_token') || '';
let currentUser = localStorage.getItem('lv_user') || '';
let currentDocId = null;
let currentVersions = [];

// ── INIT ───────────────────────────────────────────────────────────────────

window.onload = () => {
  if (token) {
    showApp();
    loadDocs();
  }
};

// ── AUTH ───────────────────────────────────────────────────────────────────

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) return setAuthErr('Please fill in all fields.');
  const fd = new FormData();
  fd.append('username', user); fd.append('password', pass);
  const r = await fetch(`${API}/auth/login`, { method: 'POST', body: fd });
  const d = await r.json();
  if (!r.ok) return setAuthErr(d.detail || 'Login failed.');
  token = d.access_token; currentUser = user;
  localStorage.setItem('lv_token', token);
  localStorage.setItem('lv_user', user);
  showApp(); loadDocs();
}

async function doRegister() {
  const user = document.getElementById('reg-user').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!user || !email || !pass) return setAuthErr('Username, email, and password are required.');
  const r = await api('POST', '/auth/register', { username: user, email, full_name: name, password: pass }, true);
  if (r._err) return setAuthErr(r._err);
  toast('Account created! Please sign in.');
  switchAuthTab('login');
  document.getElementById('login-user').value = user;
}

function setAuthErr(msg) { document.getElementById('auth-error').textContent = msg; }

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('header-user').textContent = currentUser;
}

function logout() {
  token = ''; currentUser = '';
  localStorage.removeItem('lv_token'); localStorage.removeItem('lv_user');
  location.reload();
}

// ── API HELPER ─────────────────────────────────────────────────────────────

async function api(method, path, body, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (!noAuth && token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const r = await fetch(`${API}${path}`, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (r.status === 204) return {};
    const d = await r.json();
    if (!r.ok) return { _err: d.detail || `Error ${r.status}` };
    return d;
  } catch(e) {
    return { _err: 'Cannot reach server. Is the API running on port 8000?' };
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────

let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

// ── DOCS ───────────────────────────────────────────────────────────────────

async function loadDocs() {
  const docs = await api('GET', '/documents');
  if (docs._err) return toast(docs._err, true);
  const list = document.getElementById('doc-list');
  if (!docs.length) {
    list.innerHTML = '<div class="doc-empty">No documents yet.<br/>Create your first document.</div>';
    return;
  }
  list.innerHTML = docs.map(d => `
    <div class="doc-item ${d.id === currentDocId ? 'active' : ''}" onclick="openDoc(${d.id})" id="doc-item-${d.id}">
      <div class="doc-item-title">${esc(d.title)}</div>
      <div class="doc-item-meta">${fmtDate(d.updated_at)}</div>
      <div class="doc-item-versions">v${d.version_count}</div>
    </div>
  `).join('');
}

async function openDoc(id) {
  currentDocId = id;
  document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`doc-item-${id}`);
  if (item) item.classList.add('active');

  const doc = await api('GET', `/documents/${id}`);
  if (doc._err) return toast(doc._err, true);

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('doc-view').classList.remove('hidden');
  document.getElementById('doc-title-input').value = doc.title;

  const latest = doc.latest_version;
  if (latest) {
    document.getElementById('doc-editor').value = latest.content_text;
    document.getElementById('version-badge').textContent = `v${latest.version_number}`;
  }

  switchTab('editor');
  await loadVersions(id);
}

async function loadVersions(id) {
  const versions = await api('GET', `/documents/${id}/versions`);
  if (versions._err) return;
  currentVersions = versions;

  // history panel
  const list = document.getElementById('version-list');
  list.innerHTML = versions.slice().reverse().map(v => `
    <div class="version-item ${v.version_number === parseInt(document.getElementById('version-badge').textContent.replace('v','')) ? 'active' : ''}"
         id="vi-${v.version_number}" onclick="loadVersionContent(${v.version_number})">
      <div class="version-item-num">Version ${v.version_number}</div>
      <div class="version-item-date">${fmtDate(v.created_at)}</div>
      <div class="version-item-author">by ${esc(v.created_by_username || '—')}</div>
      ${v.change_summary ? `<div class="version-item-summary">${esc(v.change_summary)}</div>` : ''}
      <div class="version-actions">
        ${versions.length > 1 ? `<button class="ver-btn del" onclick="event.stopPropagation();deleteVersion(${v.version_number})">Delete</button>` : ''}
      </div>
    </div>
  `).join('');

  // diff selects
  const va = document.getElementById('diff-va');
  const vb = document.getElementById('diff-vb');
  const opts = versions.map(v => `<option value="${v.version_number}">v${v.version_number} — ${fmtDate(v.created_at)}</option>`).join('');
  va.innerHTML = opts; vb.innerHTML = opts;
  if (versions.length >= 2) {
    va.value = versions[0].version_number;
    vb.value = versions[versions.length - 1].version_number;
  }
}

async function loadVersionContent(num) {
  const ver = await api('GET', `/documents/${currentDocId}/versions/${num}`);
  if (ver._err) return toast(ver._err, true);
  document.getElementById('doc-editor').value = ver.content_text;
  document.getElementById('version-badge').textContent = `v${ver.version_number}`;
  document.querySelectorAll('.version-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`vi-${num}`);
  if (el) el.classList.add('active');
  switchTab('editor');
}

async function saveTitle() {
  const title = document.getElementById('doc-title-input').value.trim();
  if (!title) return toast('Title cannot be empty.', true);
  const r = await api('PATCH', `/documents/${currentDocId}/title`, { title });
  if (r._err) return toast(r._err, true);
  toast('Title updated — no new version created.');
  loadDocs();
}

async function saveVersion() {
  const content = document.getElementById('doc-editor').value;
  if (!content.trim()) return toast('Content cannot be empty.', true);
  const summary = document.getElementById('change-summary').value.trim();
  const btn = document.getElementById('save-version-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const r = await api('POST', `/documents/${currentDocId}/versions`, {
    content_text: content, change_summary: summary || undefined,
  });
  btn.disabled = false; btn.textContent = 'Save Version';
  if (r._err) return toast(r._err, true);
  document.getElementById('change-summary').value = '';
  document.getElementById('version-badge').textContent = `v${r.version_number}`;
  toast(`Version ${r.version_number} saved successfully.`);
  loadVersions(currentDocId);
  loadDocs();
}

async function deleteDoc() {
  if (!confirm('Soft-delete this document? (It will be hidden but not permanently erased)')) return;
  const r = await api('DELETE', `/documents/${currentDocId}`);
  if (r._err) return toast(r._err, true);
  currentDocId = null;
  document.getElementById('doc-view').classList.add('hidden');
  document.getElementById('empty-state').classList.remove('hidden');
  toast('Document deleted.');
  loadDocs();
}

async function deleteVersion(num) {
  if (!confirm(`Delete version ${num}? This cannot be undone.`)) return;
  const r = await api('DELETE', `/documents/${currentDocId}/versions/${num}`);
  if (r._err) return toast(r._err, true);
  toast(`Version ${num} deleted.`);
  loadVersions(currentDocId);
}

// ── NEW DOC ────────────────────────────────────────────────────────────────

function showNewDocModal() { document.getElementById('new-doc-modal').classList.remove('hidden'); }
function hideNewDocModal() { document.getElementById('new-doc-modal').classList.add('hidden'); }

async function createDoc() {
  const title = document.getElementById('new-doc-title').value.trim();
  const content = document.getElementById('new-doc-content').value;
  const summary = document.getElementById('new-doc-summary').value.trim();
  if (!title) return toast('Title is required.', true);
  if (!content.trim()) return toast('Content is required.', true);
  const r = await api('POST', '/documents', {
    title, content_text: content,
    change_summary: summary || 'Initial version',
  });
  if (r._err) return toast(r._err, true);
  hideNewDocModal();
  document.getElementById('new-doc-title').value = '';
  document.getElementById('new-doc-content').value = '';
  document.getElementById('new-doc-summary').value = '';
  toast('Document created.');
  await loadDocs();
  openDoc(r.id);
}

// ── DIFF ───────────────────────────────────────────────────────────────────

function showDiffView() { switchTab('diff'); }

async function runDiff() {
  const va = document.getElementById('diff-va').value;
  const vb = document.getElementById('diff-vb').value;
  if (va === vb) return toast('Select two different versions to compare.', true);
  const r = await api('GET', `/documents/${currentDocId}/diff?version_a=${va}&version_b=${vb}`);
  if (r._err) return toast(r._err, true);

  // Stats bar
  const stats = document.getElementById('diff-stats');
  stats.classList.remove('hidden');
  const sigBadge = r.is_significant
    ? `<span class="stat-chip sig">⚠ Significant Change</span>`
    : `<span class="stat-chip eq">Minor Change</span>`;
  stats.innerHTML = `
    <span class="stat-chip add">+${r.stats.added} added</span>
    <span class="stat-chip del">-${r.stats.removed} removed</span>
    <span class="stat-chip rep">~${r.stats.replaced} replaced</span>
    <span class="stat-chip eq">${r.stats.unchanged} unchanged</span>
    <span class="stat-chip sim">${r.similarity_percent}% similar</span>
    ${sigBadge}
    <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-left:auto;">
      v${r.version_a} by ${r.author_a || '—'} → v${r.version_b} by ${r.author_b || '—'}
    </span>
  `;

  // Diff table
  const out = document.getElementById('diff-output');
  if (!r.lines.length) { out.innerHTML = '<div class="diff-placeholder">No differences found.</div>'; return; }

  let html = '<table class="diff-table">';
  for (const line of r.lines) {
    if (line.tag === 'equal') {
      html += `<tr class="eq">
        <td class="diff-ln">${line.line_number_before}</td>
        <td class="diff-tag"> </td>
        <td class="diff-content">${esc(line.content_before || '')}</td>
      </tr>`;
    } else if (line.tag === 'insert') {
      html += `<tr class="ins">
        <td class="diff-ln">${line.line_number_after}</td>
        <td class="diff-tag">+</td>
        <td class="diff-content">${esc(line.content_after || '')}</td>
      </tr>`;
    } else if (line.tag === 'delete') {
      html += `<tr class="del">
        <td class="diff-ln">${line.line_number_before}</td>
        <td class="diff-tag">−</td>
        <td class="diff-content">${esc(line.content_before || '')}</td>
      </tr>`;
    } else if (line.tag === 'replace') {
      if (line.content_before !== null) {
        html += `<tr class="rep-before">
          <td class="diff-ln">${line.line_number_before}</td>
          <td class="diff-tag">−</td>
          <td class="diff-content">${esc(line.content_before || '')}</td>
        </tr>`;
      }
      if (line.content_after !== null) {
        html += `<tr class="rep-after">
          <td class="diff-ln">${line.line_number_after}</td>
          <td class="diff-tag">+</td>
          <td class="diff-content">${esc(line.content_after || '')}</td>
        </tr>`;
      }
    }
  }
  html += '</table>';
  out.innerHTML = html;
}

// ── UI HELPERS ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.getElementById('tab-editor').classList.toggle('active', tab === 'editor');
  document.getElementById('tab-diff').classList.toggle('active', tab === 'diff');
  document.getElementById('editor-panel').classList.toggle('hidden', tab !== 'editor');
  document.getElementById('diff-panel').classList.toggle('hidden', tab !== 'diff');
  if (tab === 'diff') document.getElementById('diff-panel').style.display = 'flex';
  else document.getElementById('diff-panel').style.display = 'none';
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

// Keyboard shortcut: Ctrl+S saves version
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentDocId) {
    e.preventDefault();
    saveVersion();
  }
});
</script>
</body>
</html>
