version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./legal_docs.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=change-me-in-production
    depends_on:
      - redis
    volumes:
      - ./legal_docs.db:/app/legal_docs.db

  worker:
    build: .
    command: celery -A app.workers.notification_worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./legal_docs.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=change-me-in-production
    depends_on:
      - redis
    volumes:
      - ./legal_docs.db:/app/legal_docs.db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
